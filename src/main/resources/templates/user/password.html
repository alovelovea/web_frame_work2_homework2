<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background: linear-gradient(90deg, #1a1a2e, #0f3460);
        }

        .navbar-brand {
            font-weight: 800;
            color: #e94560 !important;
            font-size: 1.4rem;
        }

        .password-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,.08);
        }

        .card-header-custom {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            padding: 10px 20px;
        }

        .error-text {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 4px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-5">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card password-card">

                <div class="card-header card-header-custom p-4">
                    <h3 class="mb-1 fw-bold">비밀번호 변경</h3>
                    <p class="mb-0 opacity-75">
                        새로운 비밀번호를 설정하세요.
                    </p>
                </div>

                <div class="card-body p-4">

                    <form th:action="@{/user/password}"
                          th:object="${passwordChangeDto}"
                          method="post">

                        <!-- 현재 비밀번호 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                현재 비밀번호
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{currentPassword}">

                            <div class="error-text"
                                 th:if="${#fields.hasErrors('currentPassword')}"
                                 th:errors="*{currentPassword}">
                            </div>
                        </div>

                        <!-- 새 비밀번호 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                새 비밀번호
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{newPassword}">

                            <div class="error-text"
                                 th:if="${#fields.hasErrors('newPassword')}"
                                 th:errors="*{newPassword}">
                            </div>
                        </div>

                        <!-- 비밀번호 확인 -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                비밀번호 확인
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{confirmPassword}">

                            <div class="error-text"
                                 th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}">
                            </div>
                        </div>

                        <!-- 버튼 -->
                        <div class="d-flex justify-content-between">

                            <a th:href="@{/home}"
                               class="btn btn-outline-secondary btn-custom">
                                취소
                            </a>

                            <button type="submit"
                                    class="btn btn-primary btn-custom">
                                비밀번호 변경
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>
<footer class="container text-center mt-5 mb-4 text-muted">

    <hr>

    <p class="mb-1">
        학번: 2071162 / 성명: 박민재
    </p>

    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}">
    </p>

</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
